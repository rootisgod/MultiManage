#  https://ubuntu.com/tutorials/create-your-first-snap#1-overview
name: multimanage
base: core22
version: '0.1' # just for humans, typically '1.2+git' or '1.3.2'
summary: A GUI for Multipass
description: |
  A crossplatform GUI for Multipass which has been written in Python with PySimpleGUI

grade: devel # must be 'stable' to release into candidate/stable channels
confinement: devmode # use 'strict' once you have the right plugs and slots

architectures:
  - build-on: [amd64]

apps:
  multimanage:
    command: bin/multimanage
    plugs:
      - multipass-support
      - x11

parts:
  multimanage:
