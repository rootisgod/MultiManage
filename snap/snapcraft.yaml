#  https://ubuntu.com/tutorials/create-your-first-snap#1-overview
name: multimanage
base: core22
version: '0.1' # just for humans, typically '1.2+git' or '1.3.2'
summary: A GUI for Multipass
description: |
  A crossplatform GUI for Multipass which has been written in Python with PySimpleGUI

grade: devel # must be 'stable' to release into candidate/stable channels
confinement: devmode # use 'strict' once you have the right plugs and slots

architectures:
  - build-on: [amd64]

apps:
  multimanage:
    command: bin/multimanage
    plugs:
      - multipass-support
      - x11

parts:
  multimanage:
    plugin: dump
    #source: https://github.com/rootisgod/MultiManage/releases/latest/download/Linux-multimanage.zip
    source: snap_binary.zip
    stage-snaps:
      - multipass/latest/stable
    # 1.11.0
    stage-packages:
      - libxcb-dri3-0
#    plugin: python
#    python-packages:
#      - pysimplegui
#    python-requirements:
#      - requirements.txt
#    source: https://github.com/rootisgod/MultiManage.git
